services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Set in Dokploy environment variables.}
      POSTGRES_DB: ${POSTGRES_DB:-spx_voice}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spx_voice}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spx-voice-network

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required. Set in Dokploy environment variables.}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spx-voice-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required. Set in Dokploy environment variables.}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spx-voice-network

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - api-runtime:/app/api/.runtime
      - shared-tmp:/tmp
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEPLOYMENT_MODE: oss
      AUTH_PROVIDER: local
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-false}
      SINGLE_ORGANIZATION_MODE: ${SINGLE_ORGANIZATION_MODE:-true}
      MANAGED_ORGANIZATION_PROVIDER_ID: ${MANAGED_ORGANIZATION_PROVIDER_ID:-managed_single_org}
      OSS_JWT_SECRET: ${OSS_JWT_SECRET:?OSS_JWT_SECRET is required. Set in Dokploy environment variables.}

      # Public URLs — set these in Dokploy environment variables to match your domains.
      # APP_URL: The browser-facing root URL (e.g. https://voice.example.com).
      # BACKEND_API_ENDPOINT: Public API URL (e.g. https://api.voice.example.com).
      # UI_APP_URL: Public UI URL (usually same as APP_URL, e.g. https://voice.example.com).
      APP_URL: ${APP_URL:-}
      BACKEND_API_ENDPOINT: ${BACKEND_API_ENDPOINT:-}
      UI_APP_URL: ${UI_APP_URL:-}

      # Database — internal Docker network. Change only if using an external database.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-spx_voice}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379

      # Storage — internal MinIO. MINIO_PUBLIC_ENDPOINT is the browser-facing URL.
      ENABLE_AWS_S3: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?}
      MINIO_BUCKET: ${MINIO_BUCKET:-voice-audio}
      MINIO_SECURE: "false"

      FASTAPI_WORKERS: ${FASTAPI_WORKERS:-1}
      ARQ_WORKERS: ${ARQ_WORKERS:-1}

      # AI Provider API Keys
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      DEFAULT_REALTIME_MODEL: ${DEFAULT_REALTIME_MODEL:-gemini-3.1-flash-live-preview}
      DEFAULT_REALTIME_VOICE: ${DEFAULT_REALTIME_VOICE:-Kore}
      DEFAULT_REALTIME_LANGUAGE: ${DEFAULT_REALTIME_LANGUAGE:-en}
      DEFAULT_GOOGLE_LLM_MODEL: ${DEFAULT_GOOGLE_LLM_MODEL:-gemini-2.5-flash}
      DEFAULT_GOOGLE_EMBEDDING_MODEL: ${DEFAULT_GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}

      # Voice Runtime — LiveKit
      VOICE_RUNTIME: ${VOICE_RUNTIME:-livekit}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_CLIENT_URL: ${LIVEKIT_CLIENT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_AGENT_NAME: ${LIVEKIT_AGENT_NAME:-spx-voice}
      LIVEKIT_ROOM_PREFIX: ${LIVEKIT_ROOM_PREFIX:-spx-voice}
      LIVEKIT_SIP_OUTBOUND_TRUNK_ID: ${LIVEKIT_SIP_OUTBOUND_TRUNK_ID:-}
      LIVEKIT_SIP_DEFAULT_FROM_NUMBER: ${LIVEKIT_SIP_DEFAULT_FROM_NUMBER:-}
      LIVEKIT_SIP_INBOUND_HOST: ${LIVEKIT_SIP_INBOUND_HOST:-}
      LIVEKIT_WORKER_MANAGED_BY_API: "true"

      # Observability — Langfuse
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}

      # Observability — PostHog
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-false}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}

      # MPS / Hosted Cloud
      DISABLE_HOSTED_CLOUD: ${DISABLE_HOSTED_CLOUD:-true}
      MPS_API_URL: ${MPS_API_URL:-}
      HOSTED_MPS_SECRET_KEY: ${HOSTED_MPS_SECRET_KEY:-}

      # Post-call recording and webhooks
      SPX_VOICE_POST_CALL_WEBHOOK_URL: ${SPX_VOICE_POST_CALL_WEBHOOK_URL:-}
      SPX_VOICE_RECORDINGS_S3_ENDPOINT_URL: ${SPX_VOICE_RECORDINGS_S3_ENDPOINT_URL:-}
      SPX_VOICE_RECORDINGS_S3_BUCKET: ${SPX_VOICE_RECORDINGS_S3_BUCKET:-}
      SPX_VOICE_RECORDINGS_S3_ACCESS_KEY_ID: ${SPX_VOICE_RECORDINGS_S3_ACCESS_KEY_ID:-}
      SPX_VOICE_RECORDINGS_S3_SECRET_ACCESS_KEY: ${SPX_VOICE_RECORDINGS_S3_SECRET_ACCESS_KEY:-}
      SPX_VOICE_RECORDINGS_PUBLIC_BASE_URL: ${SPX_VOICE_RECORDINGS_PUBLIC_BASE_URL:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - spx-voice-network

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Internal Docker network URLs — do NOT change these.
      BACKEND_URL: http://api:8000
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-voice-audio}
      PORT: "3010"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXT_PUBLIC_NODE_ENV: oss
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-false}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      POSTHOG_UI_HOST: ${POSTHOG_UI_HOST:-}
      NEXT_PUBLIC_CHATWOOT_URL: ${NEXT_PUBLIC_CHATWOOT_URL:-}
      NEXT_PUBLIC_CHATWOOT_TOKEN: ${NEXT_PUBLIC_CHATWOOT_TOKEN:-}
    ports:
      - "3010:3010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3010 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - spx-voice-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  api-runtime:
    driver: local
  shared-tmp:
    driver: local

networks:
  spx-voice-network:
    driver: bridge
